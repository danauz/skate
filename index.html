<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛹 Classes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #09090b; --surface: #18181b; --orange: #f97316; --green: #22c55e; --border: #27272a; }
    body { background-color: var(--bg); color: #ffffff; font-family: sans-serif; overflow-x: hidden; margin: 0; }
    .neon-orange { color: var(--orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
    
    /* Tier Grid Styling */
    .tier-wrapper { margin-bottom: 2.5rem; border-left: 4px solid var(--border); padding-left: 1rem; }
    .tier-1 { border-color: #94a3b8; } .tier-2 { border-color: #fbbf24; } 
    .tier-3 { border-color: #ef4444; } .tier-4 { border-color: #3b82f6; } .tier-5 { border-color: #a855f7; }

    .trick-card { transition: all 0.2s ease; border: 2px solid var(--border); background-color: var(--surface); display: flex; flex-direction: column; justify-content: space-between; min-height: 110px; border-radius: 12px; }
    .trick-card.unlocked { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #064e3b33); }
    .trick-card.locked { opacity: 0.5; filter: grayscale(0.8); cursor: not-allowed; }
    .trick-card.available { border-color: var(--orange); border-style: dashed; }

    /* Tree View Styling */
    .tree-container-wrapper { width: 100%; height: 70vh; background: #000; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; touch-action: none; cursor: grab; }
    .tree-svg { width: 100%; height: 100%; display: block; }
    .tree-svg line { stroke: #333; stroke-width: 2; transition: stroke 0.5s; }
    .tree-svg line.lit { stroke: var(--green); stroke-width: 3; }
    .tree-node rect { rx: 6; ry: 6; cursor: pointer; fill: #18181b; stroke: #27272a; stroke-width: 2; }
    .tree-node.node-unlocked rect { fill: #064e3b; stroke: var(--green); }
    .tree-node.node-available rect { stroke: var(--orange); stroke-dasharray: 4; }
    .tree-node.node-locked { opacity: 0.4; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .menu-panel { display: none; position: absolute; right: 0; top: 110%; width: 180px; background: #27272a; border: 1px solid var(--border); border-radius: 8px; z-index: 50; }
    .menu-panel.active { display: block; }
  </style>
</head>
<body class="pb-12">
  <div class="max-w-5xl mx-auto p-4">
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-4 rounded-xl border border-zinc-800 gap-4">
      <div>
        <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Classes</h1>
        <p class="text-orange-500 text-[10px] font-bold uppercase tracking-[0.2em]">Tiered Academy</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <select id="studentSelect" onchange="switchStudent()" class="bg-zinc-800 border border-zinc-700 rounded-md px-2 py-1 text-xs outline-none font-bold uppercase"></select>
        <div class="flex bg-zinc-800 rounded-md p-1 border border-zinc-700">
            <button id="btnRegular" onclick="setStance('regular')" class="px-3 py-1 rounded text-[10px] font-black uppercase">REG</button>
            <button id="btnGoofy" onclick="setStance('goofy')" class="px-3 py-1 rounded text-[10px] font-black uppercase">GOOFY</button>
        </div>
        <button onclick="addNewStudent()" class="bg-white text-black px-3 py-1 rounded-md text-[10px] font-black uppercase">➕ ADD</button>
        <div class="relative">
          <button onclick="toggleMenu()" class="bg-zinc-800 text-zinc-400 px-3 py-1 rounded-md text-[10px] font-bold border border-zinc-700">⚙️</button>
          <div id="dataMenu" class="menu-panel p-2 shadow-2xl">
            <button onclick="exportJSON()" class="w-full text-left text-[11px] py-2 px-2 border-b border-zinc-700">📤 Export</button>
            <button onclick="importJSON()" class="w-full text-left text-[11px] py-2 px-2 border-b border-zinc-700">📥 Import</button>
            <button onclick="deleteCurrentStudent()" class="w-full text-left text-[11px] py-2 px-2 text-red-500">🗑️ Delete</button>
          </div>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
        <div class="text-zinc-500 text-[10px] font-bold uppercase">Mastered</div>
        <div id="statsProgress" class="text-2xl font-black neon-orange">0/0</div>
      </div>
      <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
        <div class="text-zinc-500 text-[10px] font-bold uppercase">View Mode</div>
        <div class="flex gap-2 mt-1">
          <button id="btnGrid" onclick="setView('grid')" class="flex-1 py-1 rounded bg-orange-600 text-[10px] font-bold">TIERS</button>
          <button id="btnTree" onclick="setView('tree')" class="flex-1 py-1 rounded bg-zinc-800 text-[10px] font-bold">TREE</button>
        </div>
      </div>
    </div>

    <input type="text" id="search" placeholder="Search tricks..." oninput="render()" class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-3 py-3 text-sm mb-6 outline-none">

    <div id="main-container"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target==this) closeModal()">
    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-md w-full shadow-2xl" id="modal-content"></div>
  </div>

<script>
    /* ==========================================
       TRICK REPOSITORY (TIER-BASED)
       ========================================== */
const tierConfig = {
      1: {
        name: "Fundamentals (Tier 1)",
        tricks: [
          { id: "stance", name: "Stance", description: "Finding your natural footing.", tips: "Which foot feels best forward?", prereqs: [] },
          { id: "push", name: "Pushing", description: "Generating momentum.", tips: "Keep weight on the front foot.", prereqs: ["stance"] },
          { id: "stop", name: "Foot Brake", description: "Controlled stopping.", tips: "Drag your back sole lightly.", prereqs: ["push"] },
          { id: "pumping", name: "Pumping", description: "Speed in transitions.", tips: "Bend knees at bottom, extend on way up.", prereqs: ["push"] },
          { id: "falling", name: "Falling", description: "Controlled Falling.", tips: "Tuck and roll, don't use hands.", prereqs: [] },
          { id: "turning", name: "Turning", description: "Basic leaning turns.", tips: "Lean into toes or heels.", prereqs: ["push"] },
          { id: "tictac", name: "Tic-Tacs", description: "Small pivot turns.", tips: "Swing shoulders first.", prereqs: ["push"] }
        ]
      },
      2: {
        name: "Basic (Tier 2)",
        tricks: [
          { id: "kickturn", name: "Kickturn", description: "Pivot turns on ramp/flat.", tips: "Point your front shoulder.", prereqs: ["push", "tictac"] },
          { id: "running_start", name: "Running Start", description: "Run and jump on.", tips: "Look where you want to go.", prereqs: ["push"] },
          { id: "hippie_jump", name: "Hippie Jump", description: "Jump and land on bolts.", tips: "Stay balanced over center.", prereqs: ["push", "falling"] },
          { id: "ride_switch", name: "Switch", description: "Non-natural stance.", tips: "Pretend you're starting over!", prereqs: ["push"] },
          { id: "roll_in", name: "Roll in", description: "Rolling into a ramp.", tips: "Commit weight forward!", prereqs: ["push"] },
          { id: "drop_in", name: "Drop-In", description: "Entering from coping.", tips: "Slam those front wheels down!", prereqs: ["stop"] },
          { id: "manual", name: "Manual", description: "2-wheel balance.", tips: "Use arms for balance.", prereqs: ["tictac"] },
          { id: "ollie", name: "Ollie", description: "Foundation jump.", tips: "Pop tail hard, slide foot up.", prereqs: ["push", "tictac", "stop"] },
          { id: "shuvit", name: "Shuvit", description: "180 board spin.", tips: "Scoop the tail back.", prereqs: ["push"] }
        ]
      },
      3: {
        name: "Intermediate (Tier 3)",
        tricks: [
          { id: "caveman", name: "Caveman", description: "Jump onto board.", tips: "Hold nose, jump, and place.", prereqs: ["stance"] },
          { id: "pop_shuvit", name: "Pop Shuvit", description: "180 board spin with a pop.", tips: "Pop it hard and scoop.", prereqs: ["shuvit"] },
          { id: "rock_to_fakie", name: "Rock to Fakie", description: "Stall and fakie out.", tips: "Lift front trucks over coping.", prereqs: ["drop_in"] },
          { id: "fly_out", name: "Fly Out", description: "Exit ramp to flat.", tips: "Level board in air.", prereqs: ["pumping"] },
          { id: "boneless", name: "Boneless", description: "Grab, plant, jump.", tips: "Plant front foot and jump.", prereqs: ["tictac"] }
        ]
      },
      4: {
        name: "Advanced (Tier 4)",
        tricks: [
          { id: "kickflip", name: "Kickflip", description: "The classic board flip.", tips: "Flick off the pocket of the nose.", prereqs: ["ollie"] },
          { id: "360_shuvit", name: "360 Shuvit", description: "Full rotation spin.", tips: "Big scoop with the back foot toes.", prereqs: ["pop_shuvit"] }
        ]
      },
      5: {
        name: "Pro (Tier 5)",
        tricks: [
          { id: "tre_flip", name: "360 Kickflip", description: "The 360 Shuv + Kickflip combo.", tips: "All in the scoop!", prereqs: ["kickflip", "360_shuvit"] }
        ]
      }
    };

    const tricksData = Object.keys(tierConfig).flatMap(lvl => tierConfig[lvl].tricks.map(t => ({ ...t, level: parseInt(lvl) })));
    let allStudents = JSON.parse(localStorage.getItem('skate_v3')) || [{ id: "s1", name: "New Skater", progress: {}, stance: "regular" }];
    let currentId = localStorage.getItem('skate_id_v3') || allStudents[0].id;
    let viewMode = 'grid';
    let zoom = 1.0, offsetX = 0, offsetY = 0, isDragging = false, lastMousePos = { x: 0, y: 0 };

    function getStudent() { return allStudents.find(s => s.id === currentId) || allStudents[0]; }
    function save() { localStorage.setItem('skate_v3', JSON.stringify(allStudents)); localStorage.setItem('skate_id_v3', currentId); }
    const isUnlocked = (id, progress) => !!progress[id];
    const canUnlock = (trick, progress) => trick.prereqs.every(p => isUnlocked(p, progress));
    const getPrereqNames = (ids) => ids.map(id => tricksData.find(t => t.id === id)?.name).filter(n => n).join(", ");

    function render() {
      const student = getStudent();
      const searchTerm = document.getElementById('search').value.toLowerCase();
      const container = document.getElementById('main-container');
      container.innerHTML = '';
      document.getElementById('statsProgress').textContent = `${Object.keys(student.progress).length}/${tricksData.length}`;
      if (viewMode === 'grid') renderGrid(student, searchTerm); else renderTree(student, searchTerm);
    }

    function renderGrid(student, searchTerm) {
      const container = document.getElementById('main-container');
      Object.keys(tierConfig).forEach(lvl => {
        const lvlTricks = tierConfig[lvl].tricks.filter(t => t.name.toLowerCase().includes(searchTerm));
        if (lvlTricks.length === 0 && searchTerm !== "") return;
        const section = document.createElement('div');
        section.className = `tier-wrapper tier-${lvl}`;
        section.innerHTML = `<h2 class="font-black italic uppercase text-sm tracking-widest text-white mb-4">${tierConfig[lvl].name}</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${lvlTricks.map(t => {
            const unlocked = isUnlocked(t.id, student.progress);
            const ready = canUnlock(t, student.progress);
            return `<div onclick="openModal('${t.id}')" class="trick-card p-3 cursor-pointer ${unlocked ? 'unlocked' : (ready ? 'available' : 'locked')}"><div><div class="flex justify-between items-start mb-1"><span class="text-[9px] font-bold text-zinc-600 uppercase">TIER ${lvl}</span>${unlocked ? '✅' : (ready ? '' : '🔒')}</div><h3 class="font-bold text-xs uppercase">${t.name}</h3></div>${(!unlocked && t.prereqs.length > 0) ? `<div class="mt-2 text-[8px] font-bold text-zinc-500 uppercase">Needs: ${getPrereqNames(t.prereqs)}</div>` : ''}</div>`;
        }).join('')}</div>`;
        container.appendChild(section);
      });
    }

    function renderTree(student, searchTerm) {
      const container = document.getElementById('main-container');
      const nodeW = 120, nodeH = 45, gapX = 50, gapY = 100;
      const pos = {};
      const sortedTiers = Object.keys(tierConfig).sort((a,b)=>a-b);
      
      // Fixed Positioning Logic: Find widest tier to define center
      let maxTierWidth = 0;
      sortedTiers.forEach(lvl => {
        const width = tierConfig[lvl].tricks.length * (nodeW + gapX);
        if (width > maxTierWidth) maxTierWidth = width;
      });

      sortedTiers.forEach((lvl, rowIdx) => {
        const tricks = tierConfig[lvl].tricks;
        const rowWidth = tricks.length * (nodeW + gapX);
        const startX = (maxTierWidth - rowWidth) / 2;
        tricks.forEach((t, colIdx) => {
          pos[t.id] = { x: startX + colIdx * (nodeW + gapX), y: rowIdx * (nodeH + gapY) + 50 };
        });
      });

      let nodes = '', lines = '';
      tricksData.forEach(t => {
        const p = pos[t.id];
        const unlocked = isUnlocked(t.id, student.progress);
        const matches = t.name.toLowerCase().includes(searchTerm);
        const opacity = matches ? 1 : 0.15;

        t.prereqs.forEach(pid => {
          const parent = pos[pid];
          if (parent) {
            const isLit = unlocked && isUnlocked(pid, student.progress);
            lines += `<line x1="${parent.x + nodeW/2}" y1="${parent.y + nodeH}" x2="${p.x + nodeW/2}" y2="${p.y}" class="${isLit ? 'lit' : ''}" style="stroke: ${isLit ? '#22c55e' : '#333'}; opacity: ${opacity}" />`;
          }
        });

        const statusClass = unlocked ? 'node-unlocked' : (canUnlock(t, student.progress) ? 'node-available' : 'node-locked');
        nodes += `<g class="tree-node ${statusClass}" onclick="openModal('${t.id}')" style="opacity: ${opacity}"><rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" /><text x="${p.x + nodeW/2}" y="${p.y + nodeH/2 + 5}" text-anchor="middle" fill="white" font-size="10" font-weight="bold" class="uppercase">${t.name}</text></g>`;
      });

      container.innerHTML = `<div class="tree-container-wrapper" id="treeWrapper"><svg id="treeSvg" class="tree-svg" style="width:${maxTierWidth}px; height:${sortedTiers.length * (nodeH + gapY) + 100}px">${lines}${nodes}</svg></div>`;
      initInteraction(document.getElementById('treeWrapper'), document.getElementById('treeSvg'));
    }

    function initInteraction(wrapper, svg) {
      const update = () => svg.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${zoom})`;
      wrapper.onmousedown = (e) => { isDragging = true; lastMousePos = { x: e.clientX, y: e.clientY }; };
      window.onmousemove = (e) => { if (!isDragging) return; offsetX += e.clientX - lastMousePos.x; offsetY += e.clientY - lastMousePos.y; lastMousePos = { x: e.clientX, y: e.clientY }; update(); };
      window.onmouseup = () => isDragging = false;
      wrapper.onwheel = (e) => { e.preventDefault(); const s = e.deltaY > 0 ? 0.9 : 1.1; zoom *= s; update(); };
      // Touch Support
      wrapper.ontouchstart = (e) => { isDragging = true; lastMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
      wrapper.ontouchmove = (e) => { if (!isDragging) return; offsetX += e.touches[0].clientX - lastMousePos.x; offsetY += e.touches[0].clientY - lastMousePos.y; lastMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; update(); };
      wrapper.ontouchend = () => isDragging = false;
    }

    window.openModal = (id) => {
      const t = tricksData.find(x => x.id === id);
      const student = getStudent();
      const unlocked = isUnlocked(id, student.progress);
      const ready = canUnlock(t, student.progress);
      document.getElementById('modal-content').innerHTML = `<h2 class="text-xl font-black italic neon-orange uppercase mb-1">${t.name}</h2>${t.prereqs.length > 0 ? `<div class="text-[10px] font-black uppercase text-zinc-500 mb-2">Needs: ${getPrereqNames(t.prereqs)}</div>` : ''}<p class="text-zinc-400 text-sm mb-4 mt-4">${t.description}</p><div class="bg-black/40 p-4 rounded-xl border border-zinc-800 mb-6"><strong class="text-orange-500 text-[10px] uppercase block mb-1">Coach Tips:</strong><p class="text-xs italic">"${t.tips}"</p></div><div class="flex gap-2">${unlocked ? `<button onclick="toggleTrick('${id}')" class="flex-1 py-3 bg-zinc-800 rounded-lg font-bold text-xs">UNLEARN</button>` : (ready ? `<button onclick="toggleTrick('${id}')" class="flex-1 py-3 bg-orange-600 rounded-lg font-bold text-xs">LEARNED</button>` : `<button class="flex-1 py-3 bg-zinc-800 text-zinc-600 rounded-lg font-bold text-xs cursor-not-allowed">LOCKED</button>`)}<button onclick="closeModal()" class="px-4 py-3 bg-zinc-700 rounded-lg font-bold text-xs">CLOSE</button></div>`;
      document.getElementById('modal-overlay').classList.add('open');
    };

    window.toggleTrick = (id) => {
      const student = getStudent();
      if (student.progress[id]) { 
        delete student.progress[id]; 
        tricksData.filter(t => t.prereqs.includes(id)).forEach(dep => { if(student.progress[dep.id]) delete student.progress[dep.id]; }); 
      } else { student.progress[id] = true; }
      save(); render(); closeModal();
    };

    window.closeModal = () => document.getElementById('modal-overlay').classList.remove('open');
    window.toggleMenu = () => document.getElementById('dataMenu').classList.toggle('active');
    window.setView = (v) => { viewMode = v; render(); };
    window.addNewStudent = () => { const n = prompt("Name:"); if (n) { allStudents.push({ id: "s" + Date.now(), name: n, progress: {}, stance: "regular" }); save(); init(); } };
    window.switchStudent = () => { currentId = document.getElementById('studentSelect').value; save(); render(); updateStanceButtons(); };
    window.deleteCurrentStudent = () => { if (allStudents.length > 1 && confirm("Delete?")) { allStudents = allStudents.filter(s => s.id !== currentId); currentId = allStudents[0].id; save(); init(); } };
    window.exportJSON = () => { const blob = new Blob([JSON.stringify(allStudents)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'skate.json'; a.click(); };
    window.importJSON = () => { const input = document.createElement('input'); input.type = 'file'; input.onchange = e => { const reader = new FileReader(); reader.onload = ev => { allStudents = JSON.parse(ev.target.result); currentId = allStudents[0].id; save(); init(); }; reader.readAsText(e.target.files[0]); }; input.click(); };
    window.setStance = (s) => { getStudent().stance = s; save(); updateStanceButtons(); };
    function updateStanceButtons() { const s = getStudent(); document.getElementById('btnRegular').className = s.stance === 'regular' ? 'px-3 py-1 rounded text-[10px] font-black bg-orange-600' : 'px-3 py-1 rounded text-[10px] font-black bg-zinc-800 text-zinc-400'; document.getElementById('btnGoofy').className = s.stance === 'goofy' ? 'px-3 py-1 rounded text-[10px] font-black bg-orange-600' : 'px-3 py-1 rounded text-[10px] font-black bg-zinc-800 text-zinc-400'; }
    function init() { document.getElementById('studentSelect').innerHTML = allStudents.map(s => `<option value="${s.id}" ${s.id === currentId ? 'selected' : ''}>${s.name.toUpperCase()}</option>`).join(''); render(); updateStanceButtons(); }
    init();
</script>
</body>
</html>
