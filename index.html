<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛹 Demented Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #09090b; --surface: #18181b; --orange: #f97316; --green: #22c55e; --border: #27272a; }
    body { background-color: var(--bg); color: #ffffff; font-family: sans-serif; overflow-x: hidden; margin: 0; }
    .neon-orange { color: var(--orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
    
    .tier-wrapper { margin-bottom: 2.5rem; border-left: 4px solid var(--border); padding-left: 1rem; }
    .trick-card { transition: all 0.2s ease; border: 2px solid var(--border); background-color: var(--surface); display: flex; flex-direction: column; justify-content: space-between; min-height: 110px; border-radius: 12px; }
    .trick-card.unlocked { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #064e3b33); }
    .trick-card.locked { opacity: 0.5; filter: grayscale(0.8); }
    .trick-card.available { border-color: var(--orange); border-style: dashed; }

    .tree-container-wrapper { width: 100%; height: 65vh; background: #000; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; touch-action: none; cursor: grab; }
    .tree-svg { width: 100%; height: 100%; display: block; }
    .tree-svg line { stroke: #333; stroke-width: 2; transition: all 0.5s; }
    .tree-svg line.lit { stroke: var(--green); stroke-width: 3; filter: drop-shadow(0 0 5px #22c55e); }
    .tree-node rect { rx: 6; ry: 6; fill: #18181b; stroke: #27272a; stroke-width: 2; }
    .tree-node.node-unlocked rect { fill: #064e3b; stroke: var(--green); }
    .tree-node.node-available rect { stroke: var(--orange); stroke-dasharray: 4; }

    .sticker-slot { width: 50px; height: 50px; background: #111; border: 2px dashed #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; filter: grayscale(1); opacity: 0.3; transition: all 0.5s; }
    .sticker-slot.earned { filter: grayscale(0); opacity: 1; border-style: solid; border-color: var(--orange); box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }

    .timer-active { animation: pulse 2s infinite; background-color: #ef4444 !important; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body class="pb-24">
  <div class="max-w-5xl mx-auto p-4">
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-4 rounded-xl border border-zinc-800 gap-4">
      <div>
        <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Demented Academy</h1>
        <div id="sessionTimer" class="text-[10px] font-bold text-zinc-500 mt-1 uppercase tracking-widest">Session: 00:00:00</div>
      </div>
      <div class="flex items-center gap-2">
        <button id="timerBtn" onclick="toggleTimer()" class="bg-zinc-800 text-white px-3 py-1 rounded-md text-[10px] font-black uppercase border border-zinc-700">Start Session</button>
        <select id="studentSelect" onchange="switchStudent()" class="bg-zinc-800 border border-zinc-700 rounded-md px-2 py-1 text-xs font-bold uppercase"></select>
      </div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
        <div class="text-zinc-500 text-[10px] font-bold uppercase">Mastered</div>
        <div id="statsProgress" class="text-2xl font-black neon-orange">0/0</div>
      </div>
      <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
        <div class="text-zinc-500 text-[10px] font-bold uppercase">View Mode</div>
        <div class="flex gap-2 mt-1">
          <button id="btnGrid" onclick="setView('grid')" class="flex-1 py-1 rounded bg-orange-600 text-[10px] font-bold">TIERS</button>
          <button id="btnTree" onclick="setView('tree')" class="flex-1 py-1 rounded bg-zinc-800 text-[10px] font-bold">TREE</button>
        </div>
      </div>
    </div>

    <div id="main-container"></div>

    <div class="mt-8 p-4 bg-zinc-900/30 rounded-2xl border border-zinc-800">
      <h3 class="text-center font-black italic uppercase text-[9px] tracking-widest mb-4 text-zinc-500">Sticker Book</h3>
      <div class="flex justify-around items-center" id="stickerContainer">
        <div id="badge-1" class="sticker-slot">🛹</div>
        <div id="badge-2" class="sticker-slot">🔥</div>
        <div id="badge-3" class="sticker-slot">⚡</div>
        <div id="badge-4" class="sticker-slot">💀</div>
        <div id="badge-5" class="sticker-slot">👑</div>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="fixed inset-0 bg-black/90 z-[100] hidden flex justify-center items-center p-4" onclick="if(event.target==this) closeModal()">
    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-md w-full" id="modal-content"></div>
  </div>

<script>
    const tierConfig = {
      1: { name: "Fundamentals (Tier 1)", tricks: [
        { id: "stance", name: "Stance", description: "Finding your natural footing.", tips: "Which foot feels best forward?", prereqs: [] },
        { id: "push", name: "Pushing", description: "Generating momentum.", tips: "Keep weight on the front foot.", prereqs: ["stance"] },
        { id: "stop", name: "Foot Brake", description: "Controlled stopping.", tips: "Drag your back sole lightly.", prereqs: ["push"] },
        { id: "pumping", name: "Pumping", description: "Speed in transitions.", tips: "Bend knees at bottom, extend on way up.", prereqs: ["push"] },
        { id: "falling", name: "Falling", description: "Controlled Falling.", tips: "Tuck and roll, don't use hands.", prereqs: [] },
        { id: "turning", name: "Turning", description: "Basic leaning turns.", tips: "Lean into toes or heels.", prereqs: ["push"] },
        { id: "tictac", name: "Tic-Tacs", description: "Small pivot turns.", tips: "Swing shoulders first.", prereqs: ["push"] }
      ]},
      2: { name: "Basic (Tier 2)", tricks: [
        { id: "kickturn", name: "Kickturn", description: "Pivot turns on ramp/flat.", tips: "Point your front shoulder.", prereqs: ["push", "tictac"] },
        { id: "running_start", name: "Running Start", description: "Run and jump on.", tips: "Look where you want to go.", prereqs: ["push"] },
        { id: "hippie_jump", name: "Hippie Jump", description: "Jump and land on bolts.", tips: "Stay balanced over center.", prereqs: ["push", "falling"] },
        { id: "ride_switch", name: "Switch", description: "Non-natural stance.", tips: "Pretend you're starting over!", prereqs: ["push"] },
        { id: "roll_in", name: "Roll in", description: "Rolling into a ramp.", tips: "Commit weight forward!", prereqs: ["push"] },
        { id: "drop_in", name: "Drop-In", description: "Entering from coping.", tips: "Slam those front wheels down!", prereqs: ["stop"] },
        { id: "manual", name: "Manual", description: "2-wheel balance.", tips: "Use arms for balance.", prereqs: ["tictac"] },
        { id: "ollie", name: "Ollie", description: "Foundation jump.", tips: "Pop tail hard, slide foot up.", prereqs: ["push", "tictac", "stop"] },
        { id: "shuvit", name: "Shuvit", description: "180 board spin.", tips: "Scoop the tail back.", prereqs: ["push"] },
        { id: "fakie_ride", name: "Fakie Riding", description: "Riding backwards.", tips: "Look over your shoulder.", prereqs: ["push"] }
      ]},
      3: { name: "Intermediate (Tier 3)", tricks: [
        { id: "pop_shuvit", name: "Pop Shuvit", description: "180 board spin with a pop.", tips: "Pop it hard and scoop.", prereqs: ["shuvit"] },
        { id: "rock_to_fakie", name: "Rock to Fakie", description: "Stall and fakie out.", tips: "Lift front trucks over coping.", prereqs: ["drop_in"] },
        { id: "caveman", name: "Caveman", description: "Jump onto board.", tips: "Hold nose, jump, and place.", prereqs: ["stance"] },
        { id: "boneless", name: "Boneless", description: "Grab, plant, jump.", tips: "Plant front foot and jump.", prereqs: ["tictac"] },
        { id: "fly_out", name: "Fly Out", description: "Exit ramp to flat.", tips: "Level board in air.", prereqs: ["pumping"] },
        { id: "fifty_fifty", name: "50-50 Grind", description: "Grinding both trucks.", tips: "Ollie straight onto the ledge.", prereqs: ["ollie"] },
        { id: "fakie_ollie", name: "Fakie Ollie", description: "Ollie while riding backwards.", tips: "Pop the nose.", prereqs: ["fakie_ride", "ollie"] }
      ]},
      4: { name: "Advanced (Tier 4)", tricks: [
        { id: "kickflip", name: "Kickflip", description: "The classic board flip.", tips: "Flick off the pocket of the nose.", prereqs: ["ollie"] },
        { id: "three_shuv", name: "360 Shuvit", description: "Full rotation spin.", tips: "Big scoop with the back foot toes.", prereqs: ["pop_shuvit"] },
        { id: "spine_transfer", name: "Spine Transfer", description: "Over a spine peak.", tips: "Lean forward over peak.", prereqs: ["fly_out"] },
        { id: "boardslide", name: "Boardslide", description: "Sliding on the middle of the deck.", tips: "Keep weight centered.", prereqs: ["fifty_fifty"] },
        { id: "half_cab", name: "Half-Cab", description: "Fakie 180 Ollie.", tips: "Swing shoulders as you pop.", prereqs: ["fakie_ollie"] }
      ]},
      5: { name: "Pro (Tier 5)", tricks: [
        { id: "tre_flip", name: "360 Kickflip", description: "360 Shuv + Kickflip combo.", tips: "All in the scoop!", prereqs: ["kickflip", "three_shuv"] },
        { id: "full_cab", name: "Full-Cab", description: "Fakie 360 Ollie.", tips: "Commit to the full rotation.", prereqs: ["half_cab"] }
      ]}
    };

    const tricksData = Object.keys(tierConfig).flatMap(lvl => tierConfig[lvl].tricks.map(t => ({ ...t, level: parseInt(lvl) })));
    let allStudents = JSON.parse(localStorage.getItem('skate_v5')) || [{ id: "s1", name: "New Skater", progress: {}, videos: {} }];
    let currentId = localStorage.getItem('skate_id_v5') || allStudents[0].id;
    let viewMode = 'grid', timerInterval = null, totalSeconds = 0;

    function getStudent() { return allStudents.find(s => s.id === currentId) || allStudents[0]; }
    function save() { localStorage.setItem('skate_v5', JSON.stringify(allStudents)); localStorage.setItem('skate_id_v5', currentId); }

    function render() {
      const s = getStudent();
      document.getElementById('statsProgress').textContent = `${Object.keys(s.progress).length}/${tricksData.length}`;
      const container = document.getElementById('main-container');
      container.innerHTML = '';
      if (viewMode === 'grid') renderGrid(s); else renderTree(s);
      updateBadges(s);
    }

    function renderGrid(student) {
      const container = document.getElementById('main-container');
      Object.keys(tierConfig).forEach(lvl => {
        const section = document.createElement('div');
        section.className = `tier-wrapper`;
        section.innerHTML = `<h2 class="font-black italic uppercase text-xs text-white mb-4">${tierConfig[lvl].name}</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${tierConfig[lvl].tricks.map(t => {
            const unlocked = student.progress[t.id];
            const ready = t.prereqs.every(p => student.progress[p]);
            return `<div onclick="openModal('${t.id}')" class="trick-card p-3 cursor-pointer ${unlocked ? 'unlocked' : (ready ? 'available' : 'locked')}"><h3 class="font-bold text-[11px] uppercase">${t.name}</h3>${student.videos[t.id] ? '<span class="text-[8px] text-orange-500 font-bold">🎥 VIDEO</span>' : ''}</div>`;
        }).join('')}</div>`;
        container.appendChild(section);
      });
    }

    function renderTree(student) {
        const container = document.getElementById('main-container');
        const nodeW = 120, nodeH = 45, gapX = 40, gapY = 80;
        const pos = {};
        const sortedTiers = Object.keys(tierConfig).sort();
        
        let maxWidth = 0;
        sortedTiers.forEach(lvl => maxWidth = Math.max(maxWidth, tierConfig[lvl].tricks.length * (nodeW + gapX)));

        sortedTiers.forEach((lvl, row) => {
            const rowTricks = tierConfig[lvl].tricks;
            const startX = (maxWidth - (rowTricks.length * (nodeW + gapX))) / 2;
            rowTricks.forEach((t, col) => pos[t.id] = { x: startX + col * (nodeW + gapX), y: row * (nodeH + gapY) + 40 });
        });

        let lines = '', nodes = '';
        tricksData.forEach(t => {
            const p = pos[t.id];
            t.prereqs.forEach(pid => {
                const parent = pos[pid];
                if (parent) {
                    const lit = student.progress[t.id] && student.progress[pid];
                    lines += `<line x1="${parent.x + nodeW/2}" y1="${parent.y + nodeH}" x2="${p.x + nodeW/2}" y2="${p.y}" class="${lit ? 'lit' : ''}" />`;
                }
            });
            const status = student.progress[t.id] ? 'node-unlocked' : (t.prereqs.every(pr => student.progress[pr]) ? 'node-available' : '');
            nodes += `<g class="tree-node ${status}" onclick="openModal('${t.id}')"><rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" /><text x="${p.x + nodeW/2}" y="${p.y + nodeH/2 + 4}" text-anchor="middle" fill="white" font-size="9" font-weight="bold" class="uppercase">${t.name}</text></g>`;
        });

        container.innerHTML = `<div class="tree-container-wrapper" id="tw"><svg class="tree-svg" id="ts" style="width:${maxWidth}px; height:${sortedTiers.length * (nodeH + gapY) + 100}px">${lines}${nodes}</svg></div>`;
    }

    function openModal(id) {
      const t = tricksData.find(x => x.id === id);
      const s = getStudent();
      document.getElementById('modal-content').innerHTML = `
        <h2 class="text-lg font-black italic neon-orange uppercase mb-2">${t.name}</h2>
        <p class="text-zinc-400 text-xs mb-4">${t.description}</p>
        <input type="text" id="vUrl" value="${s.videos[id] || ''}" placeholder="Clip Link (YouTube/IG)" class="w-full bg-black border border-zinc-800 p-2 text-xs rounded mb-4">
        <div class="flex gap-2">
          <button onclick="toggleTrick('${id}')" class="flex-1 py-3 bg-orange-600 rounded-lg font-bold text-xs uppercase">${s.progress[id] ? 'Unlearn' : 'Mastered'}</button>
          <button onclick="saveVid('${id}')" class="px-4 py-3 bg-zinc-700 rounded-lg font-bold text-xs uppercase">Save</button>
        </div>`;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    window.toggleTrick = (id) => { const s = getStudent(); if (s.progress[id]) delete s.progress[id]; else s.progress[id] = true; save(); render(); closeModal(); };
    window.saveVid = (id) => { getStudent().videos[id] = document.getElementById('vUrl').value; save(); render(); closeModal(); };
    window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
    window.setView = (v) => { viewMode = v; render(); };
    
    window.toggleTimer = () => {
      const btn = document.getElementById('timerBtn');
      if (timerInterval) {
        clearInterval(timerInterval); timerInterval = null;
        btn.textContent = "Start Session"; btn.classList.remove('timer-active');
      } else {
        timerInterval = setInterval(() => {
          totalSeconds++;
          const h = String(Math.floor(totalSeconds / 3600)).padStart(2,'0');
          const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2,'0');
          const s = String(totalSeconds % 60).padStart(2,'0');
          document.getElementById('sessionTimer').textContent = `Session: ${h}:${m}:${s}`;
        }, 1000);
        btn.textContent = "Stop Session"; btn.classList.add('timer-active');
      }
    };

    function updateBadges(student) {
        Object.keys(tierConfig).forEach(lvl => {
            const complete = tierConfig[lvl].tricks.every(t => student.progress[t.id]);
            document.getElementById(`badge-${lvl}`).className = complete ? 'sticker-slot earned' : 'sticker-slot';
        });
    }

    function init() {
      document.getElementById('studentSelect').innerHTML = allStudents.map(s => `<option value="${s.id}">${s.name.toUpperCase()}</option>`).join('');
      render();
    }
    init();
</script>
</body>
</html>
