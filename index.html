<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛹 Skills: Skill Tree</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface2: #27272a;
      --orange: #f97316;
      --green: #22c55e;
      --border: #27272a;
    }
    body { background-color: var(--bg); color: #ffffff; font-family: sans-serif; overflow-x: hidden; }
    
    .neon-orange { color: var(--orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }

    .trick-card { transition: all 0.2s ease; border: 2px solid var(--border); background-color: var(--surface); display: flex; flex-direction: column; justify-content: space-between; min-height: 110px; }
    .trick-card.unlocked { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #064e3b33); }
    .trick-card.locked { opacity: 0.5; filter: grayscale(0.8); cursor: not-allowed; }
    .trick-card.available { border-color: var(--orange); border-style: dashed; }

    .tree-view { overflow: auto; padding: 20px; background: #000; border-radius: 12px; border: 1px solid var(--border); min-height: 600px; }
    .tree-svg line { stroke: #333; stroke-width: 2; transition: all 0.3s; }
    .tree-svg line.lit { stroke: var(--green); stroke-width: 3; }
    .tree-node rect { rx: 8; ry: 8; transition: all 0.2s; cursor: pointer; }
    .node-locked { fill: #111; stroke: #333; }
    .node-unlocked { fill: #064e3b; stroke: var(--green); }
    .node-available { fill: #111; stroke: var(--orange); stroke-dasharray: 4; }

    .modal-overlay.open { display: flex; }
