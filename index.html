<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛹 Academy Pro: Full Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #09090b; --surface: #18181b; --orange: #f97316; --green: #22c55e; --border: #27272a; --gold: #f59e0b; }
    body { background-color: var(--bg); color: #ffffff; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding-bottom: 40px; }
    .btn-active { background-color: var(--orange) !important; color: white !important; border-color: var(--orange) !important; }
    .tier-wrapper { margin-bottom: 2.5rem; border-left: 4px solid var(--border); padding-left: 1rem; }
    .xp-bar { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 8px 0 16px 0; overflow: hidden; border: 1px solid var(--border); }
    .xp-fill { height: 100%; background: var(--orange); transition: width 0.5s; box-shadow: 0 0 10px var(--orange); }
    .trick-card { border: 2px solid var(--border); background: var(--surface); padding: 12px; border-radius: 12px; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; transition: 0.2s; position: relative; }
    .trick-card.unlocked { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #064e3b33); }
    .trick-card.available { border-color: var(--orange); border-style: dashed; }
    .trick-card.locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
    .dot.active { background: var(--orange); box-shadow: 0 0 5px var(--orange); }
    .timer-active { animation: pulse 2s infinite; background: #ef4444 !important; }
    @keyframes pulse { 50% { opacity: 0.7; } }
    input, textarea, select { background: #000 !important; border: 1px solid var(--border) !important; color: white !important; outline: none; }
  </style>
</head>
<body>
  <div class="max-w-2xl mx-auto p-4">
    <header class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-4">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h1 class="text-xl font-black italic uppercase tracking-tighter">Academy Coach</h1>
          <div id="sessionTimer" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Session: 00:00:00</div>
        </div>
        <button id="timerBtn" onclick="toggleTimer()" class="bg-zinc-800 text-[10px] font-bold uppercase px-5 py-2 rounded border border-zinc-700 transition-colors">Start Session</button>
      </div>
      <div class="flex gap-2">
        <select id="studentSelect" onchange="switchStudent(this.value)" class="flex-1 rounded px-3 py-2 text-xs font-bold uppercase tracking-wider"></select>
        <button onclick="addStudent()" class="bg-zinc-800 px-4 rounded border border-zinc-700 font-bold hover:bg-zinc-700">＋</button>
      </div>
    </header>

    <div class="grid grid-cols-4 gap-1 mb-6">
      <button onclick="setView('grid')" id="v-grid" class="py-2 rounded bg-zinc-800 text-[10px] font-bold uppercase">Tiers</button>
      <button onclick="setView('plan')" id="v-plan" class="py-2 rounded bg-zinc-800 text-[10px] font-bold uppercase">Plan</button>
      <button onclick="setView('log')" id="v-log" class="py-2 rounded bg-zinc-800 text-[10px] font-bold uppercase">Log</button>
      <button onclick="setView('trophy')" id="v-trophy" class="py-2 rounded bg-zinc-800 text-[10px] font-bold uppercase">🏆</button>
    </div>

    <div id="main"></div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50" onclick="if(event.target==this) closeM()">
    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl w-full max-w-xs shadow-2xl" id="m-content"></div>
  </div>

<script>
    // FULL TRICK DATABASE
    const tierConfig = {
      1: { name: "Fundamentals", tricks: [
        { id: "stance", name: "Stance", pre: [] },
        { id: "push", name: "Pushing", pre: ["stance"] },
        { id: "stop", name: "Foot Brake", pre: ["push"] },
        { id: "pumping", name: "Pumping", pre: ["push"] },
        { id: "falling", name: "Falling", pre: [] },
        { id: "turn", name: "Turning", pre: ["push"] },
        { id: "tictac", name: "Tic-Tacs", pre: ["push"] }
      ]},
      2: { name: "Basic", tricks: [
        { id: "kickturn", name: "Kickturn", pre: ["tictac"] },
        { id: "run", name: "Running Start", pre: ["push"] },
        { id: "hippie", name: "Hippie Jump", pre: ["falling"] },
        { id: "dropin", name: "Drop-In", pre: ["stop"] },
        { id: "manual", name: "Manual", pre: ["tictac"] },
        { id: "ollie", name: "Ollie", pre: ["push", "stop"] },
        { id: "shuvit", name: "Shuvit", pre: ["push"] },
        { id: "fakie", name: "Fakie Ride", pre: ["push"] }
      ]},
      3: { name: "Intermediate", tricks: [
        { id: "pop", name: "Pop Shuvit", pre: ["shuvit"] },
        { id: "rock", name: "Rock to Fakie", pre: ["dropin"] },
        { id: "caveman", name: "Caveman", pre: ["stance"] },
        { id: "boneless", name: "Boneless", pre: ["tictac"] },
        { id: "fifty", name: "50-50 Grind", pre: ["ollie"] },
        { id: "follie", name: "Fakie Ollie", pre: ["fakie", "ollie"] }
      ]},
      4: { name: "Advanced", tricks: [
        { id: "kickflip", name: "Kickflip", pre: ["ollie"] },
        { id: "heelflip", name: "Heelflip", pre: ["ollie"] },
        { id: "threeshuv", name: "360 Shuvit", pre: ["pop"] },
        { id: "boardslide", name: "Boardslide", pre: ["fifty"] },
        { id: "hcab", name: "Half-Cab", pre: ["follie"] }
      ]},
      5: { name: "Pro", tricks: [
        { id: "tre", name: "360 Flip", pre: ["kickflip", "threeshuv"] },
        { id: "fcab", name: "Full-Cab", pre: ["hcab"] },
        { id: "smith", name: "Smith Grind", pre: ["fifty", "kickflip"] }
      ]}
    };

    const allTricks = Object.values(tierConfig).flatMap(t => t.tricks);
    
    // STATE MANAGEMENT
    let students = JSON.parse(localStorage.getItem('skate_v26_final')) || [
      { id: "s1", name: "New Skater", progress: {}, data: {}, log: [], plan: {}, goal: "", stance: "Regular" }
    ];
    let sid = localStorage.getItem('sid_v26_final') || students[0].id;
    let view = 'grid', timer = null, sec = 0;

    function getS() { return students.find(s => s.id === sid) || students[0]; }
    function save() { localStorage.setItem('skate_v26_final', JSON.stringify(students)); localStorage.setItem('sid_v26_final', sid); }

    // RENDER ENGINE
    function render() {
      const s = getS(); const root = document.getElementById('main'); root.innerHTML = '';
      
      document.querySelectorAll('[id^="v-"]').forEach(b => b.className = 'py-2 rounded bg-zinc-800 text-zinc-500 text-[10px] font-bold uppercase tracking-wider');
      document.getElementById('v-'+view).className = 'py-2 rounded btn-active text-[10px] font-bold uppercase tracking-wider';

      if (view === 'grid') {
        Object.keys(tierConfig).forEach(l => {
          const t = tierConfig[l]; 
          const done = t.tricks.filter(x => s.progress[x.id]).length;
          const pct = Math.round((done / t.tricks.length) * 100);
          
          const div = document.createElement('div'); div.className = 'tier-wrapper';
          div.innerHTML = `
            <div class="flex justify-between text-[10px] font-black uppercase mb-1 tracking-tighter">
              <span class="text-zinc-500">Tier ${l}: ${t.name}</span>
              <span class="text-orange-500">${pct}% XP</span>
            </div>
            <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
            <div class="grid grid-cols-2 gap-3">
              ${t.tricks.map(tr => {
                const isMastered = s.progress[tr.id];
                const isAvailable = tr.pre.every(p => s.progress[p]);
                const conf = (s.data[tr.id] || {}).c || 0;
                return `
                  <div onclick="openM('${tr.id}')" class="trick-card ${isMastered ? 'unlocked' : (isAvailable ? 'available' : 'locked')}">
                    <span class="text-[11px] font-black uppercase italic tracking-tight">${tr.name}</span>
                    <div class="flex gap-1">${[1,2,3].map(n => `<div class="dot ${conf >= n ? 'active' : ''}"></div>`).join('')}</div>
                  </div>`;
              }).join('')}
            </div>`;
          root.appendChild(div);
        });
      } 
      
      else if (view === 'plan') {
        const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
        root.innerHTML = `
          <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <div class="flex justify-between items-center mb-6 bg-black p-4 rounded-xl border border-zinc-800">
              <span class="text-[10px] font-black uppercase text-zinc-500">Active Stance</span>
              <button onclick="toggleStance()" class="text-xs font-black uppercase text-orange-500">${s.stance || 'Regular'} 🛹</button>
            </div>
            <h3 class="text-[10px] font-black uppercase text-orange-500 mb-4 tracking-widest text-center">Weekly Training Plan</h3>
            <div class="grid grid-cols-7 gap-1 mb-8">
              ${days.map(d => `<button onclick="tDay('${d}')" class="py-4 text-[10px] font-bold rounded-lg border transition-all ${s.plan[d]?'bg-orange-600 border-orange-400 shadow-lg shadow-orange-900/20 text-white':'bg-zinc-800 border-zinc-700 text-zinc-500'}">${d}</button>`).join('')}
            </div>
            <h3 class="text-[10px] font-black uppercase text-orange-500 mb-2 tracking-widest">Focus Goal</h3>
            <textarea oninput="sGoal(this.value)" class="w-full p-4 text-xs rounded-xl mb-8 border border-zinc-800 bg-black" rows="4" placeholder="What trick are we battling this week?">${s.goal||''}</textarea>
            
            <div class="grid grid-cols-2 gap-2 mt-4 pt-6 border-t border-zinc-800">
              <button onclick="exportData()" class="py-3 bg-zinc-800 rounded-lg text-[9px] font-bold uppercase text-zinc-400 border border-zinc-700">Backup App Data</button>
              <button onclick="importData()" class="py-3 bg-zinc-800 rounded-lg text-[9px] font-bold uppercase text-zinc-400 border border-zinc-700">Restore Data</button>
            </div>
          </div>`;
      } 
      
      else if (view === 'log') {
        root.innerHTML = `
          <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <h3 class="text-[10px] font-black uppercase text-orange-500 mb-6 tracking-widest">Coaching History</h3>
            ${s.log.length ? s.log.slice().reverse().map(l => `
              <div class="mb-3 p-4 bg-black rounded-xl border-l-4 border-orange-600">
                <div class="flex justify-between text-[10px] font-black mb-2">
                  <span class="text-orange-500 uppercase">${l.d}</span>
                  <span class="text-zinc-500 uppercase">${Math.floor(l.t/60)}m ${l.t%60}s</span>
                </div>
                <p class="text-xs text-zinc-300 leading-relaxed">${l.n}</p>
              </div>`).join('') : '<p class="text-center text-zinc-600 text-[10px] py-16 uppercase font-bold tracking-widest">No sessions logged</p>'}
          </div>`;
      }

      else if (view === 'trophy') {
        root.innerHTML = `
          <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h3 class="text-sm font-black uppercase text-white mb-1">Academy Rank</h3>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Level: ${Object.keys(s.progress).length} Tricks Mastered</p>
          </div>`;
      }
    }

    // INTERACTION LOGIC
    window.toggleTimer = () => {
      const b = document.getElementById('timerBtn'); const s = getS();
      if (timer) {
        clearInterval(timer); timer = null; b.textContent = "Start Session"; b.classList.remove('timer-active');
        const n = prompt("Session Summary (e.g. Landed first Ollie):");
        s.log.push({ d: new Date().toLocaleDateString('en-AU'), t: sec, n: n || "Practice session" });
        sec = 0; document.getElementById('sessionTimer').textContent = "Session: 00:00:00";
        save(); render();
      } else {
        timer = setInterval(() => { sec++; const h=String(Math.floor(sec/3600)).padStart(2,'0'), m=String(Math.floor((sec%3600)/60)).padStart(2,'0'), sc=String(sec%60).padStart(2,'0'); document.getElementById('sessionTimer').textContent = `Session: ${h}:${m}:${sc}`; }, 1000);
        b.textContent = "Stop Session"; b.classList.add('timer-active');
      }
    };

    window.openM = (id) => {
      const tr = allTricks.find(x => x.id === id), s = getS(); s.data[id] = s.data[id] || { c: 0, n: "" };
      document.getElementById('m-content').innerHTML = `
        <h2 class="text-base font-black uppercase mb-4 italic text-orange-500 tracking-tighter">${tr.name}</h2>
        <div class="mb-6">
          <label class="text-[9px] font-black uppercase text-zinc-500 block mb-2">Confidence Level</label>
          <div class="flex gap-1">${[1,2,3].map(n => `
            <button onclick="sConf('${id}',${n})" class="flex-1 py-3 rounded-lg border text-[9px] font-bold uppercase transition-all ${s.data[id].c>=n?'bg-orange-600 border-orange-400 text-white':'bg-zinc-800 border-zinc-700 text-zinc-500'}">${n==3?'Bolted':n==2?'Solid':'Sketch'}</button>`).join('')}
          </div>
        </div>
        <textarea oninput="sNote('${id}',this.value)" class="w-full p-4 rounded-xl text-xs mb-6 bg-black border border-zinc-800" rows="4" placeholder="Add trainer notes...">${s.data[id].n}</textarea>
        <button onclick="tTrick('${id}')" class="w-full py-4 ${s.progress[id]?'bg-zinc-800 text-zinc-400':'bg-green-600 text-white shadow-lg shadow-green-900/20'} rounded-xl font-black text-xs uppercase tracking-widest">${s.progress[id]?'Reset Progress':'Mark Mastered'}</button>`;
      document.getElementById('modal').classList.remove('hidden');
    };

    window.sConf = (id, v) => { getS().data[id].c = v; save(); openM(id); render(); };
    window.sNote = (id, v) => { getS().data[id].n = v; save(); };
    window.tTrick = (id) => { const s = getS(); if(s.progress[id]) delete s.progress[id]; else s.progress[id] = true; save(); render(); closeM(); };
    window.closeM = () => document.getElementById('modal').classList.add('hidden');
    window.setView = (v) => { view = v; render(); };
    window.tDay = (d) => { const s = getS(); s.plan = s.plan || {}; s.plan[d] = !s.plan[d]; save(); render(); };
    window.sGoal = (v) => { getS().goal = v; save(); };
    window.toggleStance = () => { const s = getS(); s.stance = s.stance === "Regular"?"Goofy":"Regular"; save(); render(); };
    
    window.switchStudent = (v) => { sid = v; save(); render(); };
    window.addStudent = () => { const n = prompt("New Skater Name:"); if(n){ const id='s'+Date.now(); students.push({id, name:n, progress:{}, data:{}, log:[], plan:{}, goal:"", stance:"Regular"}); sid=id; save(); init(); } };

    window.exportData = () => {
      const blob = new Blob([JSON.stringify(students)], {type: 'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `academy_coach_backup.json`; a.click();
    };
    
    window.importData = () => {
      const i = document.createElement('input'); i.type = 'file';
      i.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => { 
          try { 
            const data = JSON.parse(ev.target.result); 
            students = data; save(); location.reload(); 
          } catch(err) { alert("Invalid Backup File"); }
        };
        reader.readAsText(e.target.files[0]);
      };
      i.click();
    };

    function init() {
      const sel = document.getElementById('studentSelect');
      if(sel) {
        sel.innerHTML = students.map(s => `<option value="${s.id}" ${s.id===sid?'selected':''}>${s.name.toUpperCase()}</option>`).join('');
      }
      render();
    }
    
    init();
</script>
</body>
</html>
