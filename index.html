<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛹 Skills: Skill Tree</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface2: #27272a;
      --orange: #f97316;
      --green: #22c55e;
      --border: #27272a;
    }
    body { background-color: var(--bg); color: #ffffff; font-family: sans-serif; overflow-x: hidden; }
    .neon-orange { color: var(--orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
    .trick-card { transition: all 0.2s ease; border: 2px solid var(--border); background-color: var(--surface); display: flex; flex-direction: column; justify-content: space-between; min-height: 110px; }
    .trick-card.unlocked { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #064e3b33); }
    .trick-card.locked { opacity: 0.5; filter: grayscale(0.8); cursor: not-allowed; }
    .trick-card.available { border-color: var(--orange); border-style: dashed; }
    .tree-view { overflow: auto; padding: 20px; background: #000; border-radius: 12px; border: 1px solid var(--border); min-height: 700px; }
    .tree-svg line { stroke: #333; stroke-width: 2; }
    .tree-svg line.lit { stroke: var(--green); stroke-width: 3; }
    .tree-node rect { rx: 8; ry: 8; cursor: pointer; }
    .node-locked { fill: #111; stroke: #333; }
    .node-unlocked { fill: #064e3b; stroke: var(--green); }
    .node-available { fill: #111; stroke: var(--orange); stroke-dasharray: 4; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .menu-panel { display: none; position: absolute; right: 0; top: 110%; width: 180px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; z-index: 50; }
    .menu-panel.active { display: block; }
  </style>
</head>
<body class="min-h-screen pb-12">
  <div class="max-w-5xl mx-auto p-4">
    <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-zinc-900 p-4 rounded-xl border border-zinc-800 gap-4">
      <div>
        <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">SKILL<span class="neon-orange">TREE</span></h1>
        <p class="text-orange-500 text-[10px] font-bold uppercase tracking-[0.2em]">Progression Tracker</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <select id="studentSelect" onchange="switchStudent()" class="bg-zinc-800 border border-zinc-700 rounded-md px-2 py-1 text-xs outline-none"></select>
        <div class="flex bg-zinc-800 rounded-md p-1 border border-zinc-700">
            <button id="btnRegular" onclick="setStance('regular')" class="px-3 py-1 rounded text-[10px] font-black uppercase">REGULAR</button>
            <button id="btnGoofy" onclick="setStance('goofy')" class="px-3 py-1 rounded text-[10px] font-black uppercase">GOOFY</button>
        </div>
        <button onclick="addNewStudent()" class="bg-white text-black px-3 py-1 rounded-md text-[10px] font-black uppercase hover:bg-orange-500 hover:text-white">➕ Add Skater</button>
        <div class="relative">
          <button onclick="toggleMenu()" class="bg-zinc-800 text-zinc-400 px-3 py-1 rounded-md text-[10px] font-bold border border-zinc-700">SETTINGS ⚙️</button>
          <div id="dataMenu" class="menu-panel p-2 shadow-2xl">
            <button onclick="exportJSON()" class="w-full text-left text-[11px] py-2 px-2 border-b border-zinc-700">📤 Export</button>
            <button onclick="importJSON()" class="w-full text-left text-[11px] py-2 px-2 border-b border-zinc-700">📥 Import</button>
            <button onclick="deleteCurrentStudent()" class="w-full text-left text-[11px] py-2 px-2 text-red-500">🗑️ Delete</button>
          </div>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div class="flex gap-6 bg-zinc-900/50 p-4 rounded-xl border border-zinc-800">
        <div class="stat"><div class="text-zinc-500 text-[10px] font-bold uppercase">Mastered</div><div id="statsProgress" class="text-2xl font-black neon-orange">0/0</div></div>
        <div class="stat"><div class="text-zinc-500 text-[10px] font-bold uppercase">Ready</div><div id="statsAvail" class="text-2xl font-black text-white">0</div></div>
      </div>
      <div class="flex flex-col gap-2">
        <div class="flex gap-2">
          <button id="btnGrid" onclick="setView('grid')" class="flex-1 py-2 rounded-md text-xs font-bold bg-orange-600">📋 GRID</button>
          <button id="btnTree" onclick="setView('tree')" class="flex-1 py-2 rounded-md text-xs font-bold bg-zinc-800">🌳 TREE</button>
        </div>
        <input type="text" id="search" placeholder="Search tricks..." oninput="render()" class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-3 py-2 text-sm outline-none">
      </div>
    </div>
    <div id="tree-container"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay"><div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-md w-full shadow-2xl" id="modal-content"></div></div>

<script>
const tricksData = [
      /* TIER 1: THE BASICS */
      { id: "stance", name: "Stance", category: "tier1", level: 1, description: "Finding your natural footing.", tips: "Which foot feels best forward?", prereqs: [], imageTag: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Skateboard_Stances.jpg/640px-Skateboard_Stances.jpg" },
      { id: "push", name: "Pushing", category: "tier1", level: 1, description: "Generating momentum.", tips: "Keep weight on the front foot.", prereqs: ["stance"] },
      { id: "stop", name: "Foot Brake", category: "tier1", level: 1, description: "Controlled stopping.", tips: "Drag your back sole lightly.", prereqs: ["push"] },
      { id: "falling", name: "Falling", category: "tier1", level: 1, description: "Controlled Falling.", tips: "Tuck and roll, don't use hands.", prereqs: [] },
      { id: "turning", name: "Turning", category: "tier1", level: 1, description: "Basic leaning turns.", tips: "Lean into toes or heels.", prereqs: ["push"] },
      { id: "tictac", name: "Tic-Tacs", category: "tier1", level: 1, description: "Small pivot turns.", tips: "Swing shoulders first.", prereqs: ["push"] },
      { id: "pumping", name: "Pumping", category: "tier1", level: 1, description: "Speed in transitions.", tips: "Bend knees at the bottom.", prereqs: ["push"] },

      /* TIER 2: ESSENTIAL SKILLS */
      { id: "kickturn", name: "Kickturn", category: "tier2", level: 2, description: "Pivot on ramps.", tips: "Point your front shoulder.", prereqs: ["tictac"] },
      { id: "running start", name: "Running Start", category: "tier2", level: 2, description: "Run and jump on.", tips: "Drop the board slightly ahead of you.", prereqs: ["push"] },
      { id: "hippie jump", name: "Hippie Jump", category: "tier2", level: 2, description: "Jump and land on bolts.", tips: "Stay balanced over center.", prereqs: ["falling"] },
      { id: "ride switch", name: "Switch", category: "tier2", level: 2, description: "Riding non-natural stance.", tips: "Pretend you are a beginner again!", prereqs: ["push"] },
      { id: "roll in", name: "Roll in", category: "tier2", level: 2, description: "Rolling into a ramp.", tips: "Commit weight forward!", prereqs: ["pumping"] },
      { id: "drop-in", name: "Drop-In", category: "tier2", level: 2, description: "Entering from coping.", tips: "Slam those front wheels down!", prereqs: ["stop"] },
      { id: "manual", name: "Manual", category: "tier2", level: 2, description: "Balancing on 2 wheels.", tips: "Use arms for balance.", prereqs: ["tictac"] },
      { id: "ollie", name: "Ollie", category: "tier2", level: 2, description: "Jump with the board.", tips: "Pop tail hard, slide foot up.", prereqs: ["tictac", "stop"] },

      /* TIER 3: INTERMEDIATE */
      { id: "shuvit", name: "Shuvit", category: "tier3", level: 3, description: "Spin board 180 degrees.", tips: "Scoop the tail back.", prereqs: ["push"] },
      { id: "nollie shuvit", name: "Nollie Shuvit", category: "tier3", level: 3, description: "Front-foot scoop.", tips: "Pop the nose and scoop forward.", prereqs: ["shuvit"] },
      { id: "caveman", name: "Caveman", category: "tier3", level: 3, description: "Jumping onto the board.", tips: "Hold nose, jump, and place.", prereqs: ["stance"] },
      { id: "rock to fakie", name: "Rock to Fakie", category: "tier3", level: 3, description: "Ramp stall to backward.", tips: "Lift front trucks to clear coping.", prereqs: ["drop-in"] },
      { id: "fly out", name: "Fly Out", category: "tier3", level: 3, description: "Exit ramp to flat ground.", tips: "Level the board in the air.", prereqs: ["pumping"] },
      { id: "boneless", name: "Boneless", category: "tier3", level: 3, description: "Grab, plant foot, jump.", tips: "Plant front foot and jump.", prereqs: ["tictac"] },

      /* TIER 4: ADVANCED TRANSITION */
      { id: "spine transfer", name: "Spine Transfer", category: "tier4", level: 4, description: "Over a spine ramp.", tips: "Maintain speed, lean forward.", prereqs: ["fly out"] },
      { id: "rock and roll", name: "Rock & Roll", category: "tier4", level: 4, description: "Stall and 180 out.", tips: "Turn your head before the board.", prereqs: ["rock to fakie"] },

      /* TIER 5: PRO LEVEL */
      { id: "kickflip", name: "Kickflip", category: "tier5", level: 5, description: "Flipping board on axis.", tips: "Flick off the 'pocket' of nose.", prereqs: ["ollie"] },
      { id: "heelflip", name: "Heelflip", category: "tier5", level: 5, description: "Flipping with your heel.", tips: "Kick out in front of you.", prereqs: ["ollie"] }
    ];

    const CATEGORIES = { 
        tier1: { name: 'Tier 1', icon: '🔰' }, 
        tier2: { name: 'Tier 2', icon: '🛹' }, 
        tier3: { name: 'Tier 3', icon: '⭐' }, 
        tier4: { name: 'Tier 4', icon: '🔥' }, 
        tier5: { name: 'Tier 5', icon: '🏆' } 
    };

    let allStudents = JSON.parse(localStorage.getItem('skate_v3')) || [{ id: "s1", name: "New Skater", progress: {}, stance: "regular" }];
    let currentId = localStorage.getItem('skate_id_v3') || allStudents[0].id;
    let viewMode = 'grid';

    function getStudent() { return allStudents.find(s => s.id === currentId) || allStudents[0]; }
    function save() { localStorage.setItem('skate_v3', JSON.stringify(allStudents)); localStorage.setItem('skate_id_v3', currentId); }
    const isUnlocked = (id, progress) => !!progress[id];
    const canUnlock = (trick, progress) => trick.prereqs.every(p => isUnlocked(p, progress));
    const getPrereqNames = (ids) => ids.map(id => tricksData.find(t => t.id === id)?.name).filter(n => n).join(", ");

    function render() {
      const student = getStudent();
      const searchTerm = document.getElementById('search').value.toLowerCase();
      const container = document.getElementById('tree-container');
      container.innerHTML = '';
      document.getElementById('statsProgress').textContent = `${Object.keys(student.progress).length}/${tricksData.length}`;
      document.getElementById('statsAvail').textContent = tricksData.filter(t => !isUnlocked(t.id, student.progress) && canUnlock(t, student.progress)).length;
      if (viewMode === 'grid') renderGrid(student, searchTerm); else renderTree(student, searchTerm);
    }

    function renderGrid(student, searchTerm) {
      const container = document.getElementById('tree-container');
      Object.keys(CATEGORIES).sort().forEach(catKey => {
        const catTricks = tricksData.filter(t => t.category === catKey && t.name.toLowerCase().includes(searchTerm));
        if (catTricks.length === 0) return;
        const section = document.createElement('div');
        section.className = "mb-8";
        section.innerHTML = `<div class="flex items-center gap-2 mb-4"><span class="text-xl">${CATEGORIES[catKey].icon}</span><h2 class="font-black italic uppercase text-xs tracking-widest">${CATEGORIES[catKey].name}</h2><div class="h-px flex-1 bg-zinc-800"></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${catTricks.map(t => {
          const unlocked = isUnlocked(t.id, student.progress);
          const ready = canUnlock(t, student.progress);
          return `<div onclick="openModal('${t.id}')" class="trick-card p-3 rounded-lg cursor-pointer ${unlocked ? 'unlocked' : (ready ? 'available' : 'locked')}"><div><div class="flex justify-between items-start mb-1"><span class="text-[9px] font-bold text-zinc-500 uppercase">LVL ${t.level}</span>${unlocked ? '✅' : (ready ? '' : '🔒')}</div><h3 class="font-bold text-xs truncate uppercase">${t.name}</h3></div>${(!unlocked && t.prereqs.length > 0) ? `<div class="mt-2 text-[8px] font-bold text-zinc-500 uppercase">Needs: ${getPrereqNames(t.prereqs)}</div>` : ''}</div>`;
        }).join('')}</div>`;
        container.appendChild(section);
      });
    }

    function renderTree(student, searchTerm) {
      const container = document.getElementById('tree-container');
      const nodeW = 130, nodeH = 50, padX = 20, padY = 90;
      const svgW = Math.max(container.clientWidth, 800);
      const levels = {};
      tricksData.forEach(t => { levels[t.level] = levels[t.level] || []; levels[t.level].push(t); });
      const sortedLevelKeys = Object.keys(levels).sort((a, b) => a - b);
      const pos = {};
      sortedLevelKeys.forEach((lvl, rowIdx) => {
        const row = levels[lvl];
        const startX = (svgW - (row.length * (nodeW + padX))) / 2;
        row.forEach((t, colIdx) => { pos[t.id] = { x: startX + colIdx * (nodeW + padX), y: rowIdx * (nodeH + padY) + 40 }; });
      });
      let nodesMarkup = '', linesMarkup = '';
      tricksData.forEach(t => {
        const p = pos[t.id];
        if (!p) return;
        const unlocked = isUnlocked(t.id, student.progress);
        const ready = canUnlock(t, student.progress);
        t.prereqs.forEach(pid => {
          const parent = pos[pid];
          if (parent) linesMarkup += `<line x1="${parent.x + nodeW/2}" y1="${parent.y + nodeH}" x2="${p.x + nodeW/2}" y2="${p.y}" class="${unlocked && isUnlocked(pid, student.progress) ? 'lit' : ''}" />`;
        });
        nodesMarkup += `<g class="tree-node" onclick="openModal('${t.id}')"><rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" class="${unlocked ? 'node-unlocked' : (ready ? 'node-available' : 'node-locked')}" /><text x="${p.x + nodeW/2}" y="${p.y + 28}" text-anchor="middle" fill="white" font-size="9" font-weight="bold" class="uppercase">${t.name}</text><text x="${p.x + nodeW/2}" y="${p.y - 8}" text-anchor="middle" fill="#f97316" font-size="8" font-weight="black">TIER ${t.level}</text></g>`;
      });
      const dynamicHeight = sortedLevelKeys.length * (nodeH + padY) + 100;
      container.innerHTML = `<div class="tree-view"><svg width="${svgW}" height="${dynamicHeight}" class="tree-svg">${linesMarkup}${nodesMarkup}</svg></div>`;
    }

    // THE FIXED MODAL FUNCTION
    window.openModal = (id) => {
      const t = tricksData.find(x => x.id === id);
      const student = getStudent();
      const unlocked = isUnlocked(id, student.progress);
      const ready = canUnlock(t, student.progress);
      
      // FIX: This creates a real IMG tag if there is a link
      let visualContent = '';
      if (t.imageTag && t.imageTag.startsWith('http')) {
        visualContent = `<img src="${t.imageTag}" class="w-full h-full object-cover" alt="${t.name} guide">`;
      } else {
        visualContent = `
            <div class="text-center p-4">
                <span class="text-2xl mb-2 block">📷</span>
                <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">No Image Yet</span>
                <p class="text-[9px] text-zinc-600 mt-1 italic">Click 'Edit' in code to add a URL</p>
            </div>`;
      }

      document.getElementById('modal-content').innerHTML = `
        <h2 class="text-xl font-black italic neon-orange uppercase mb-1">${t.name}</h2>
        ${t.prereqs.length > 0 ? `<div class="text-[10px] font-black uppercase text-zinc-500 mb-2">Needs: ${getPrereqNames(t.prereqs)}</div>` : ''}
        
        <div class="my-4 aspect-video bg-zinc-800 rounded-lg flex items-center justify-center border border-zinc-700 overflow-hidden">
            ${visualContent}
        </div>

        <p class="text-zinc-400 text-sm mb-4">${t.description}</p>
        <div class="bg-black/40 p-4 rounded-xl border border-zinc-800 mb-6">
            <strong class="text-orange-500 text-[10px] uppercase block mb-1">Coach Tips:</strong>
            <p class="text-xs italic">"${t.tips}"</p>
        </div>
        <div class="flex gap-2">
            ${unlocked ? `<button onclick="toggleTrick('${id}')" class="flex-1 py-3 bg-zinc-800 rounded-lg font-bold text-xs">UNLEARN</button>` : (ready ? `<button onclick="toggleTrick('${id}')" class="flex-1 py-3 bg-orange-600 rounded-lg font-bold text-xs">LEARNED</button>` : `<button class="flex-1 py-3 bg-zinc-800 text-zinc-600 rounded-lg font-bold text-xs cursor-not-allowed">LOCKED</button>`)}
            <button onclick="closeModal()" class="px-4 py-3 bg-zinc-700 rounded-lg font-bold text-xs">CLOSE</button>
        </div>`;
      document.getElementById('modal-overlay').classList.add('open');
    };

    window.toggleTrick = (id) => {
      const student = getStudent();
      if (student.progress[id]) { 
        delete student.progress[id]; 
        tricksData.filter(t => t.prereqs.includes(id)).forEach(dep => { if(student.progress[dep.id]) delete student.progress[dep.id]; }); 
      } else { 
        student.progress[id] = true; 
      }
      save(); render(); closeModal();
    };

    window.closeModal = () => document.getElementById('modal-overlay').classList.remove('open');
    window.toggleMenu = () => document.getElementById('dataMenu').classList.toggle('active');
    window.setView = (v) => { 
      viewMode = v; 
      document.getElementById('btnGrid').className = v === 'grid' ? 'flex-1 py-2 rounded-md text-xs font-bold bg-orange-600' : 'flex-1 py-2 rounded-md text-xs font-bold bg-zinc-800'; 
      document.getElementById('btnTree').className = v === 'tree' ? 'flex-1 py-2 rounded-md text-xs font-bold bg-orange-600' : 'flex-1 py-2 rounded-md text-xs font-bold bg-zinc-800'; 
      render(); 
    };
    window.addNewStudent = () => { const n = prompt("Name:"); if (n) { const newS = { id: "s" + Date.now(), name: n, progress: {}, stance: "regular" }; allStudents.push(newS); currentId = newS.id; save(); init(); } };
    window.switchStudent = () => { currentId = document.getElementById('studentSelect').value; save(); render(); updateStanceButtons(); };
    window.deleteCurrentStudent = () => { if (allStudents.length > 1 && confirm("Delete?")) { allStudents = allStudents.filter(s => s.id !== currentId); currentId = allStudents[0].id; save(); init(); } };
    window.exportJSON = () => { const blob = new Blob([JSON.stringify(allStudents)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'skate.json'; a.click(); };
    window.importJSON = () => { const input = document.createElement('input'); input.type = 'file'; input.onchange = e => { const reader = new FileReader(); reader.onload = ev => { allStudents = JSON.parse(ev.target.result); currentId = allStudents[0].id; save(); init(); }; reader.readAsText(e.target.files[0]); }; input.click(); };
    window.setStance = (s) => { const student = getStudent(); student.stance = s; save(); updateStanceButtons(); };
    function updateStanceButtons() { const s = getStudent(); document.getElementById('btnRegular').className = s.stance === 'regular' ? 'px-3 py-1 rounded text-[10px] font-black bg-blue-600' : 'px-3 py-1 rounded text-[10px] font-black bg-zinc-800 text-zinc-400'; document.getElementById('btnGoofy').className = s.stance === 'goofy' ? 'px-3 py-1 rounded text-[10px] font-black bg-purple-600' : 'px-3 py-1 rounded text-[10px] font-black bg-zinc-800 text-zinc-400'; }
    function init() { const sel = document.getElementById('studentSelect'); sel.innerHTML = allStudents.map(s => `<option value="${s.id}" ${s.id === currentId ? 'selected' : ''}>${s.name.toUpperCase()}</option>`).join(''); render(); updateStanceButtons(); }
    init();
</script>
</body>
</html>
