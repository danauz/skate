<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛹 Academy Pro: Master Build</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #09090b; --surface: #18181b; --orange: #f97316; --green: #22c55e; --border: #27272a; --gold: #f59e0b; }
    body { background-color: var(--bg); color: #ffffff; font-family: sans-serif; overflow-x: hidden; margin: 0; }
    .btn-active { background-color: var(--orange) !important; color: white !important; }
    .tier-wrapper { margin-bottom: 2.5rem; border-left: 4px solid var(--border); padding-left: 1rem; }
    .xp-bar-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 8px 0 16px 0; overflow: hidden; border: 1px solid var(--border); }
    .xp-bar-fill { height: 100%; background: var(--orange); transition: width 0.5s ease; box-shadow: 0 0 10px var(--orange); }
    .trick-card { transition: all 0.2s ease; border: 2px solid var(--border); background-color: var(--surface); display: flex; flex-direction: column; justify-content: space-between; min-height: 110px; border-radius: 12px; cursor: pointer; }
    .trick-card.unlocked { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #064e3b33); }
    .trick-card.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
    .trick-card.available { border-color: var(--orange); border-style: dashed; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
    .dot.active { background: var(--orange); box-shadow: 0 0 5px var(--orange); }
    .tree-container-wrapper { width: 100%; height: 60vh; background: #000; border-radius: 12px; border: 1px solid var(--border); overflow: auto; }
    .tree-svg { display: block; background: radial-gradient(circle, #111 1px, transparent 1px); background-size: 30px 30px; }
    .node-unlocked rect { stroke: var(--green); fill: #064e3b; }
    .node-available rect { stroke: var(--orange); stroke-dasharray: 4; }
    .node-locked { opacity: 0.3; }
    .tree-svg line { stroke: #333; stroke-width: 2; }
    .tree-svg line.lit { stroke: var(--green); stroke-width: 3; }
    .timer-active { animation: pulse 2s infinite; background-color: #ef4444 !important; }
    input, textarea, select { background: #000 !important; border: 1px solid var(--border) !important; color: white !important; outline: none; }
    @keyframes pulse { 50% { opacity: 0.7; } }
  </style>
</head>
<body class="pb-24">
  <div class="max-w-5xl mx-auto p-4">
    <header class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-4">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
          <h1 class="text-xl font-black italic uppercase tracking-tighter">Academy Coach</h1>
          <div id="sessionTimer" class="text-[9px] font-bold text-zinc-500 mt-1 uppercase">Session: 00:00:00</div>
        </div>
        <div class="flex flex-wrap gap-2 justify-center">
          <button id="timerBtn" onclick="toggleTimer()" class="bg-zinc-800 text-[9px] font-bold uppercase px-3 py-1 rounded border border-zinc-700">Start Session</button>
          <select id="studentSelect" onchange="switchStudent(this.value)" class="bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs font-bold uppercase"></select>
          <button onclick="addStudent()" class="bg-zinc-800 px-2 rounded border border-zinc-700 text-xs">＋</button>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-4 gap-1 mb-6">
      <button id="btnGrid" onclick="setView('grid')" class="py-2 rounded bg-zinc-800 text-[9px] font-bold uppercase">Tiers</button>
      <button id="btnTree" onclick="setView('tree')" class="py-2 rounded bg-zinc-800 text-[9px] font-bold uppercase">Tree</button>
      <button id="btnSched" onclick="setView('schedule')" class="py-2 rounded bg-zinc-800 text-[9px] font-bold uppercase">Plan</button>
      <button id="btnHistory" onclick="setView('history')" class="py-2 rounded bg-zinc-800 text-[9px] font-bold uppercase">Log</button>
    </div>

    <div id="main-container"></div>
  </div>

  <div id="modal-overlay" class="fixed inset-0 bg-black/90 z-[100] hidden flex justify-center items-center p-4" onclick="if(event.target==this) closeModal()">
    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-md w-full" id="modal-content"></div>
  </div>

<script>
    const tierConfig = {
      1: { name: "Fundamentals", tricks: [
        { id: "stance", name: "Stance", pre: [] },
        { id: "push", name: "Pushing", pre: ["stance"] },
        { id: "stop", name: "Foot Brake", pre: ["push"] },
        { id: "pumping", name: "Pumping", pre: ["push"] },
        { id: "falling", name: "Falling", pre: [] },
        { id: "turning", name: "Turning", pre: ["push"] },
        { id: "tictac", name: "Tic-Tacs", pre: ["push"] }
      ]},
      2: { name: "Basic", tricks: [
        { id: "kickturn", name: "Kickturn", pre: ["tictac"] },
        { id: "runstart", name: "Running Start", pre: ["push"] },
        { id: "hippie", name: "Hippie Jump", pre: ["falling"] },
        { id: "dropin", name: "Drop-In", pre: ["stop"] },
        { id: "manual", name: "Manual", pre: ["tictac"] },
        { id: "ollie", name: "Ollie", pre: ["push", "stop"] },
        { id: "shuvit", name: "Shuvit", pre: ["push"] },
        { id: "fakie", name: "Fakie Ride", pre: ["push"] }
      ]},
      3: { name: "Intermediate", tricks: [
        { id: "pop", name: "Pop Shuvit", pre: ["shuvit"] },
        { id: "rock", name: "Rock to Fakie", pre: ["dropin"] },
        { id: "caveman", name: "Caveman", pre: ["stance"] },
        { id: "boneless", name: "Boneless", pre: ["tictac"] },
        { id: "fifty", name: "50-50 Grind", pre: ["ollie"] },
        { id: "follie", name: "Fakie Ollie", pre: ["fakie", "ollie"] }
      ]},
      4: { name: "Advanced", tricks: [
        { id: "kickflip", name: "Kickflip", pre: ["ollie"] },
        { id: "threeshuv", name: "360 Shuvit", pre: ["pop"] },
        { id: "boardslide", name: "Boardslide", pre: ["fifty"] },
        { id: "hcab", name: "Half-Cab", pre: ["follie"] }
      ]},
      5: { name: "Pro", tricks: [
        { id: "tre", name: "360 Flip", pre: ["kickflip", "threeshuv"] },
        { id: "fcab", name: "Full-Cab", pre: ["hcab"] }
      ]}
    };

    const tricksData = Object.keys(tierConfig).flatMap(lvl => tierConfig[lvl].tricks.map(t => ({ ...t, level: parseInt(lvl) })));
    let students = JSON.parse(localStorage.getItem('skate_v26_master')) || [{ id: "s1", name: "Skater 1", progress: {}, trickData: {}, history: [], plan: {}, goal: "", stance: "Regular" }];
    let currentId = localStorage.getItem('sid_v26_master') || students[0].id;
    let viewMode = 'grid', timerInterval = null, currentSessionSec = 0;

    function getS() { return students.find(s => s.id === currentId) || students[0]; }
    function save() { localStorage.setItem('skate_v26_master', JSON.stringify(students)); localStorage.setItem('sid_v26_master', currentId); }

    function render() {
      const s = getS(); const container = document.getElementById('main-container'); container.innerHTML = '';
      const btns = ['btnGrid', 'btnTree', 'btnSched', 'btnHistory'];
      btns.forEach(b => document.getElementById(b).className = 'py-2 rounded bg-zinc-800 text-zinc-400 text-[9px] font-bold uppercase');
      const activeBtn = viewMode === 'grid' ? 'btnGrid' : viewMode === 'tree' ? 'btnTree' : viewMode === 'schedule' ? 'btnSched' : 'btnHistory';
      document.getElementById(activeBtn).className = 'py-2 rounded btn-active text-[9px] font-bold uppercase';

      if (viewMode === 'grid') renderGrid(s);
      else if (viewMode === 'tree') renderTree(s);
      else if (viewMode === 'schedule') renderSchedule(s);
      else renderHistory(s);
    }

    function renderGrid(student) {
      Object.keys(tierConfig).forEach(lvl => {
        const row = tierConfig[lvl].tricks;
        const xp = (row.filter(t => student.progress[t.id]).length / row.length) * 100;
        const section = document.createElement('div'); section.className = `tier-wrapper`;
        section.innerHTML = `<div class="flex justify-between items-end"><h2 class="font-black italic uppercase text-xs text-zinc-500">Tier ${lvl}</h2><span class="text-[9px] font-bold text-orange-500">${Math.round(xp)}% XP</span></div><div class="xp-bar-bg"><div class="xp-bar-fill" style="width: ${xp}%"></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${row.map(t => {
            const unlocked = student.progress[t.id], ready = t.pre.every(p => student.progress[p]), conf = (student.trickData[t.id] || {}).confidence || 0;
            return `<div onclick="openModal('${t.id}')" class="trick-card p-3 ${unlocked ? 'unlocked' : (ready ? 'available' : 'locked')}"><h3 class="font-bold text-[10px] uppercase">${t.name}</h3><div class="confidence-dots flex gap-1 mt-2">${[1,2,3].map(n => `<div class="dot ${conf >= n ? 'active' : ''}"></div>`).join('')}</div></div>`;
        }).join('')}</div>`;
        document.getElementById('main-container').appendChild(section);
      });
    }

    function renderTree(student) {
        const nodeW = 100, nodeH = 40, gapX = 30, gapY = 60;
        const pos = {}; const sortedTiers = Object.keys(tierConfig).sort();
        let maxWidth = sortedTiers.reduce((max, lvl) => Math.max(max, tierConfig[lvl].tricks.length * (nodeW + gapX)), 0);
        sortedTiers.forEach((lvl, row) => {
            const rowTricks = tierConfig[lvl].tricks; const startX = (maxWidth - (rowTricks.length * (nodeW + gapX))) / 2;
            rowTricks.forEach((t, col) => pos[t.id] = { x: startX + col * (nodeW + gapX), y: row * (nodeH + gapY) + 20 });
        });
        let lines = '', nodes = '';
        tricksData.forEach(t => {
            const p = pos[t.id]; t.pre.forEach(pid => {
                const parent = pos[pid]; if (parent) { const lit = student.progress[t.id] && student.progress[pid]; lines += `<line x1="${parent.x + nodeW/2}" y1="${parent.y + nodeH}" x2="${p.x + nodeW/2}" y2="${p.y}" class="${lit ? 'lit' : ''}" stroke="#333" />`; }
            });
            const status = student.progress[t.id] ? 'node-unlocked' : (t.pre.every(pr => student.progress[pr]) ? 'node-available' : 'node-locked');
            nodes += `<g class="${status}" onclick="openModal('${t.id}')" style="cursor:pointer"><rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" rx="6" fill="#18181b" stroke="#333" /><text x="${p.x + nodeW/2}" y="${p.y + nodeH/2 + 4}" text-anchor="middle" fill="white" font-size="8" font-weight="bold" class="uppercase">${t.name}</text></g>`;
        });
        document.getElementById('main-container').innerHTML = `<div class="tree-container-wrapper"><svg class="tree-svg" style="width:${maxWidth}px; height:${sortedTiers.length * (nodeH + gapY) + 60}px">${lines}${nodes}</svg></div>`;
    }

    function renderSchedule(student) {
        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        document.getElementById('main-container').innerHTML = `
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <div class="flex justify-between items-center mb-6 bg-black p-3 rounded-xl border border-zinc-800">
                    <span class="text-[10px] font-bold uppercase text-zinc-500">Stance</span>
                    <button onclick="toggleStance()" class="text-xs font-black uppercase text-orange-500">${student.stance || 'Regular'} 🛹</button>
                </div>
                <div class="grid grid-cols-7 gap-1 mb-6">
                    ${days.map(d => `<button onclick="toggleDay('${d}')" class="py-3 text-[10px] font-bold rounded-lg border ${student.plan && student.plan[d] ? 'bg-orange-600 border-orange-400' : 'bg-zinc-800 border-zinc-700 text-zinc-500'}">${d}</button>`).join('')}
                </div>
                <textarea oninput="saveGoal(this.value)" class="w-full bg-black border border-zinc-800 p-4 text-xs rounded-xl mb-4" rows="4" placeholder="Weekly Battle Goal...">${student.goal || ''}</textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportData()" class="py-2 bg-zinc-800 rounded text-[9px] font-bold uppercase text-zinc-500">Export</button>
                    <button onclick="importData()" class="py-2 bg-zinc-800 rounded text-[9px] font-bold uppercase text-zinc-500">Import</button>
                </div>
            </div>`;
    }

    function renderHistory(student) {
        document.getElementById('main-container').innerHTML = `
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl">
                <h3 class="text-xs font-black uppercase text-orange-500 mb-4">Session Log</h3>
                ${(student.history || []).slice().reverse().map(l => `
                    <div class="bg-black p-3 rounded-xl border-l-2 border-orange-500 mb-2">
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-orange-500">${l.date}</span>
                            <span class="text-zinc-500">${Math.floor(l.duration/60)}m ${l.duration%60}s</span>
                        </div>
                        <p class="text-xs text-zinc-300 mt-1">${l.note}</p>
                    </div>`).join('') || '<p class="text-center py-10 text-zinc-600 text-[10px]">No sessions yet.</p>'}
            </div>`;
    }

    window.toggleTimer = () => {
        const btn = document.getElementById('timerBtn'); const s = getS();
        if (timerInterval) {
            clearInterval(timerInterval); timerInterval = null; btn.textContent = "Start Session"; btn.classList.remove('timer-active');
            const note = prompt("Session Note:");
            s.history.push({ date: new Date().toLocaleDateString('en-AU'), duration: currentSessionSec, note: note || "Skate session" });
            currentSessionSec = 0; document.getElementById('sessionTimer').textContent = "Session: 00:00:00"; save(); render();
        } else {
            timerInterval = setInterval(() => { currentSessionSec++; const h=String(Math.floor(currentSessionSec/3600)).padStart(2,'0'), m=String(Math.floor((currentSessionSec%3600)/60)).padStart(2,'0'), sc=String(currentSessionSec%60).padStart(2,'0'); document.getElementById('sessionTimer').textContent = `Session: ${h}:${m}:${sc}`; }, 1000);
            btn.textContent = "Stop Session"; btn.classList.add('timer-active');
        }
    };

    window.openModal = (id) => {
        const t = tricksData.find(x => x.id === id), s = getS(); s.trickData[id] = s.trickData[id] || { confidence: 0, notes: '' };
        document.getElementById('modal-content').innerHTML = `
            <h2 class="text-lg font-black italic text-orange-500 uppercase mb-4">${t.name}</h2>
            <div class="flex gap-1 mb-6">${[1,2,3].map(n => `<button onclick="setConfidence('${id}',${n})" class="flex-1 py-3 rounded-lg border text-[9px] font-bold uppercase ${s.trickData[id].confidence>=n?'bg-orange-600 border-orange-400':'bg-zinc-800 border-zinc-700'}">${n==3?'Bolt':n==2?'Solid':'Sketch'}</button>`).join('')}</div>
            <textarea oninput="saveNote('${id}',this.value)" class="w-full p-3 rounded-xl text-xs mb-4" rows="3">${s.trickData[id].notes}</textarea>
            <button onclick="toggleTrick('${id}')" class="w-full py-4 ${s.progress[id]?'bg-zinc-800':'bg-green-600'} rounded-xl font-bold text-xs uppercase">${s.progress[id]?'Undo':'Mastered'}</button>`;
        document.getElementById('modal-overlay').classList.remove('hidden');
    }

    window.setConfidence = (id, v) => { getS().trickData[id].confidence = v; save(); openModal(id); render(); };
    window.saveNote = (id, v) => { getS().trickData[id].notes = v; save(); };
    window.toggleTrick = (id) => { const s = getS(); if(s.progress[id]) delete s.progress[id]; else s.progress[id]=true; save(); render(); closeModal(); };
    window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
    window.setView = (v) => { viewMode = v; render(); };
    window.toggleDay = (d) => { const s = getS(); s.plan = s.plan || {}; s.plan[d] = !s.plan[d]; save(); render(); };
    window.saveGoal = (v) => { getS().goal = v; save(); };
    window.toggleStance = () => { const s = getS(); s.stance = (s.stance==="Regular"?"Goofy":"Regular"); save(); render(); };
    window.switchStudent = (id) => { currentId = id; save(); render(); };
    window.addStudent = () => { const n = prompt("Name:"); if(n){ const id='s'+Date.now(); students.push({id, name:n, progress:{}, trickData:{}, history:[], plan:{}, goal:"", stance:"Regular"}); currentId=id; save(); init(); } };

    window.exportData = () => {
        const blob = new Blob([JSON.stringify(students)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `skate_coach_master.json`; a.click();
    };
    window.importData = () => {
        const i = document.createElement('input'); i.type = 'file';
        i.onchange = e => {
            const r = new FileReader(); r.onload = ev => { students = JSON.parse(ev.target.result); save(); location.reload(); };
            r.readAsText(e.target.files[0]);
        }; i.click();
    };

    function init() {
        const sel = document.getElementById('studentSelect');
        sel.innerHTML = students.map(s => `<option value="${s.id}" ${s.id===currentId?'selected':''}>${s.name.toUpperCase()}</option>`).join('');
        render();
    }
    init();
</script>
</body>
</html>
